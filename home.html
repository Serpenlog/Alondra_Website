<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alondra's Quinceañera</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: 'Open Sans', Arial, sans-serif;
            background-color: #fdf6f0;
            color: #333;
        }
        .home-container { text-align: center; }
        .hero {
            background-color: #d7a7aa;
            color: #fff;
            padding: 80px 20px;
        }
        .title {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            margin: 0;
        }
        .date {
            font-size: 1.5rem;
            margin-top: 0.5rem;
        }
        .invitation {
            padding: 2rem;
            font-size: 1.2rem;
        }
        .schedule {
            background: #fff;
            padding: 2rem;
        }
        .schedule h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            margin-top: 0;
        }
        .schedule ul {
            list-style: none;
            padding: 0;
        }
        .schedule li {
            margin: 0.5rem 0;
        }
        .letter-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .open-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #d7a7aa;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .open-btn i {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        footer {
            background: #333;
            color: #fff;
            padding: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="home.js"></script>
</body>
</html>
